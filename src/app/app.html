<!-- IHSAN REMS – App Shell -->
<div class="app-shell" [class.dark-theme]="darkMode()">
  <app-sidebar *ngIf="authService.isAuthenticated()" [darkMode]="darkMode()" (themeToggle)="toggleTheme()"></app-sidebar>
  <main class="main-content" [style.padding]="authService.isAuthenticated() ? '24px 32px' : '0'">
    <router-outlet></router-outlet>
  </main>
</div>
